spring.application.name=farm_animals_shop

server.port=${PORT:8080}

# \uB85C\uADF8 \uB808\uBCA8 \uC124\uC815.
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

#\uB370\uC774\uD130\uBCA0\uC774\uC2A4 \uC5F0\uACB0 \uC815\uBCF4 (\uB85C\uCEEC MariaDB)
#spring.datasource.driverClassName=org.mariadb.jdbc.Driver
#spring.datasource.url=jdbc:mariadb://localhost:3306/study_db

#spring.datasource.driver-class-name=${DB_DRIVER}
#spring.datasource.url=${DB_URL}
#spring.datasource.username=${DB_USERNAME}
#spring.datasource.password=${DB_PASSWORD}

spring.datasource.url=${MYSQL_PUBLIC_URL}
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.jdbc.Driver

# DDL \uC790\uB3D9 \uC0DD\uC131
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

#\uCFFC\uB9AC\uBB38\uC774 \uC788\uB294 mapper \uD30C\uC77C \uC704\uCE58 \uC9C0\uC815, classpath\uB294 resources \uD3F4\uB354\uB97C \uC758\uBBF8\uD568
mybatis.mapper-locations=classpath:mapper/*.xml
#DB\uC5D0\uC11C \uC5B8\uB354\uC2A4\uCF54\uC5B4\uB85C \uBA85\uBA85\uB41C \uCEEC\uB7FC\uBA85\uC744 \uBCC0\uACBD
mybatis.configuration.map-underscore-to-camel-case=true
#select \uCFFC\uB9AC \uACB0\uACFC\uB97C \uAC00\uC838\uC62C DTO \uD074\uB798\uC2A4 \uD30C\uC77C\uC774 \uC120\uC5B8\uB41C \uD328\uD0A4\uC9C0\uBA85 \uC9C0\uC815
mybatis.type-aliases-package=com.green.farm_animals_shop

#OAuth2 \uC124\uC815
# \uAD6C\uAE00 \uB85C\uADF8\uC778 \uC124\uC815
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email

# JWT \uC124\uC815
# bash $ openssl rand -base64 64 \uBA85\uB839\uC5B4 \uC785\uB825\uC73C\uB85C \uC0DD\uC131
jwt.secret=${JWT_SECRET}

# \uB2E8\uC77C \uD30C\uC77C \uC0AC\uC774\uC988
spring.servlet.multipart.max-file-size=5MB
# \uC804\uCCB4 \uC694\uCCAD \uC0AC\uC774\uC988
spring.servlet.multipart.max-request-size=5MB

# \uD30C\uC77C\uC5C5\uB85C\uB4DC \uACBD\uB85C
file.upload.path = E:/Study/Green_Academy/Project/T_Billion_Dollers/Spring_Boot/farm_animals_shop/src/main/resources/static/upload/

# \uAE30\uC0C1\uCCAD api
weather.api.key=${WEATHER_API_KEY}

# CoolSMS API \uC124\uC815
coolsms.apiKey=${COOLSMS_API_KEY}
coolsms.apiSecret=${COOLSMS_API_SECRET}
coolsms.sender=${COOLSMS_SENDER}

